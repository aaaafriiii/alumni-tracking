<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Alumni Tracker</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);">
    
    <div class="card animate-fade-in" style="width: 100%; max-width: 400px; padding: 3rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <div style="width: 64px; height: 64px; background: var(--primary); color: white; border-radius: 16px; display: inline-flex; align-items: center; justify-content: center; font-size: 2rem; margin-bottom: 1rem; box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);">
                <i class="bi bi-radar"></i>
            </div>
            <h2 style="font-weight: 700;">Selamat Datang</h2>
            <p style="color: var(--secondary); font-size: 0.875rem;">Silakan login untuk mengelola data alumni</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <div style="position: relative;">
                    <i class="bi bi-person" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--secondary);"></i>
                    <input type="text" id="username" class="form-control" style="padding-left: 2.75rem;" placeholder="admin" required>
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div style="position: relative;">
                    <i class="bi bi-lock" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--secondary);"></i>
                    <input type="password" id="password" class="form-control" style="padding-left: 2.75rem;" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
                Masuk <i class="bi bi-arrow-right"></i>
            </button>
        </form>

        <div id="message" style="margin-top: 1.5rem; text-align: center; font-size: 0.875rem; display: none;"></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalContent = btn.innerHTML;
            
            // Loading state
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Memproses...';
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    messageDiv.style.color = '#10b981';
                    messageDiv.textContent = 'Login berhasil! Mengalihkan...';
                    messageDiv.style.display = 'block';
                    localStorage.setItem('isLoggedIn', 'true');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    btn.disabled = false;
                    btn.innerHTML = originalContent;
                    messageDiv.style.color = '#ef4444';
                    messageDiv.textContent = data.message || 'Username atau Password salah';
                    messageDiv.style.display = 'block';
                }
            } catch (error) {
                btn.disabled = false;
                btn.innerHTML = originalContent;
                messageDiv.style.color = '#ef4444';
                messageDiv.textContent = 'Terjadi kesalahan pada server atau database sedang memuat.';
                messageDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
